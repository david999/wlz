# ===== 迭代 1:价差监控配置 =====
# 全局:盘口数据超过该毫秒数视为过期(两腿任一过期则本次不计算)
staleness_ms: 2000

# 监控对象:每个 pair 是"同一资产、不同合约"的一对腿(现货 vs 永续)
# 手续费为 taker 费率(基点,1 bps = 0.01%),净价差计算按【开+平】往返双腿收取
pairs:
  - name: "BTC-basis"
    spot_symbol: "BTC/USDT"
    perp_symbol: "BTC/USDT:USDT"
    threshold_bps: 20
    spot_taker_fee_bps: 8
    perp_taker_fee_bps: 5

  - name: "ETH-basis"
    spot_symbol: "ETH/USDT"
    perp_symbol: "ETH/USDT:USDT"
    threshold_bps: 20
    spot_taker_fee_bps: 8
    perp_taker_fee_bps: 5

